<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermas - Supermercado Avicola</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="static/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div id="topbar" class="top-bar"></div>
    <div id="alertBox"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Mermas</h5>
      <button class="btn btn-warning btn-sm" onclick="openModal()"><i class="bi bi-plus-lg"></i> Registrar Merma</button>
    </div>
    <div class="card">
      <div class="card-body p-0 table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr><th>Fecha</th><th>Producto</th><th>Cantidad</th><th>Motivo</th><th>Descripcion</th></tr></thead>
          <tbody id="tableBody"><tr><td colspan="5" class="text-center">Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Registrar Merma</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div id="modalAlert"></div>
          <div class="mb-3"><label class="form-label">Producto</label><select id="producto_id" class="form-select" required></select></div>
          <div class="mb-3"><label class="form-label">Cantidad</label><input type="number" id="cantidad" class="form-control" min="0.001" step="0.001" required></div>
          <div class="mb-3"><label class="form-label">Motivo</label>
            <select id="motivo" class="form-select">
              <option value="vencimiento">Vencimiento</option><option value="dano">Dano</option>
              <option value="robo">Robo</option><option value="ajuste">Ajuste</option><option value="otro">Otro</option>
            </select>
          </div>
          <div class="mb-3"><label class="form-label">Descripcion</label><textarea id="descripcion" class="form-control" rows="2"></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-warning" onclick="save()">Registrar</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/layout.js"></script>
  <script>
    initPage('Mermas', '/mermas.html');
    let modal, productosCache = [];

    async function init() {
      productosCache = await apiGet('/productos/?activo=true');
      document.getElementById('producto_id').innerHTML = productosCache.map(p => `<option value="${p.id}">${p.nombre} (${p.codigo})</option>`).join('');
      load();
    }

    async function load() {
      const data = await apiGet('/mermas/');
      const prodMap = {}; productosCache.forEach(p => prodMap[p.id] = p.nombre);
      document.getElementById('tableBody').innerHTML = data.length === 0
        ? '<tr><td colspan="5" class="text-center text-muted">Sin mermas registradas</td></tr>'
        : data.map(m => `<tr>
            <td>${formatDateTime(m.created_at)}</td><td>${prodMap[m.producto_id]||m.producto_id}</td>
            <td>${m.cantidad}</td><td><span class="badge bg-warning text-dark">${m.motivo}</span></td>
            <td>${m.descripcion||'-'}</td>
          </tr>`).join('');
    }

    function openModal() {
      document.getElementById('cantidad').value = '';
      document.getElementById('descripcion').value = '';
      document.getElementById('modalAlert').innerHTML = '';
      modal = new bootstrap.Modal(document.getElementById('formModal')); modal.show();
    }

    async function save() {
      try {
        await apiPost('/mermas/', {
          producto_id: parseInt(document.getElementById('producto_id').value),
          cantidad: parseFloat(document.getElementById('cantidad').value),
          motivo: document.getElementById('motivo').value,
          descripcion: document.getElementById('descripcion').value || null,
        });
        modal.hide(); load();
      } catch(err) { showAlert(document.getElementById('modalAlert'), err.message); }
    }

    init();
  </script>
</body>
</html>
