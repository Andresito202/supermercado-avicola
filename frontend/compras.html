<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compras - Supermercado Avicola</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="static/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div id="topbar" class="top-bar"></div>
    <div id="alertBox"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Compras</h5>
      <button class="btn btn-success btn-sm" onclick="openModal()"><i class="bi bi-plus-lg"></i> Nueva Compra</button>
    </div>
    <div class="card">
      <div class="card-body p-0 table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr><th>ID</th><th>Fecha</th><th>Proveedor</th><th>Total</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody id="tableBody"><tr><td colspan="6" class="text-center">Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Nueva Compra</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div id="modalAlert"></div>
          <div class="row g-3 mb-3">
            <div class="col-md-6"><label class="form-label">Proveedor</label><select id="proveedor_id" class="form-select" required></select></div>
            <div class="col-md-6"><label class="form-label">Observaciones</label><input type="text" id="observaciones" class="form-control"></div>
          </div>
          <h6>Detalle de productos</h6>
          <div id="detalleRows"></div>
          <button class="btn btn-outline-primary btn-sm mt-2" onclick="addRow()"><i class="bi bi-plus"></i> Agregar producto</button>
          <div class="mt-3 text-end"><strong>Total: <span id="totalCompra">$0</span></strong></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-success" onclick="save()">Registrar Compra</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/layout.js"></script>
  <script>
    initPage('Compras', '/compras.html');
    let modal, proveedores=[], productos=[];

    async function init() {
      proveedores = await apiGet('/proveedores/?activo=true');
      productos = await apiGet('/productos/?activo=true');
      const sel = document.getElementById('proveedor_id');
      sel.innerHTML = '<option value="">Seleccionar...</option>' + proveedores.map(p=>`<option value="${p.id}">${p.nombre} (${p.nit})</option>`).join('');
      load();
    }

    async function load() {
      const data = await apiGet('/compras/');
      const provMap = {}; proveedores.forEach(p=>provMap[p.id]=p.nombre);
      document.getElementById('tableBody').innerHTML = data.length===0
        ? '<tr><td colspan="6" class="text-center text-muted">Sin compras</td></tr>'
        : data.map(c=>`<tr>
            <td>${c.id}</td><td>${formatDateTime(c.fecha)}</td><td>${provMap[c.proveedor_id]||c.proveedor_id}</td>
            <td>${formatMoney(c.total)}</td>
            <td><span class="badge ${c.estado==='recibida'?'bg-success':c.estado==='anulada'?'bg-danger':'bg-warning'}">${c.estado}</span></td>
            <td>${c.estado==='recibida'?`<button class="btn btn-sm btn-outline-danger" onclick="anular(${c.id})">Anular</button>`:''}</td>
          </tr>`).join('');
    }

    function addRow() {
      const div = document.createElement('div');
      div.className = 'row g-2 mb-2 detalle-row';
      div.innerHTML = `
        <div class="col-md-5"><select class="form-select form-select-sm prod-sel">${productos.map(p=>`<option value="${p.id}">${p.nombre} (${p.codigo})</option>`).join('')}</select></div>
        <div class="col-md-3"><input type="number" class="form-control form-control-sm cant-input" placeholder="Cantidad" min="0.001" step="0.001" oninput="calcTotal()"></div>
        <div class="col-md-3"><input type="number" class="form-control form-control-sm costo-input" placeholder="Costo unit." min="0" step="0.01" oninput="calcTotal()"></div>
        <div class="col-md-1"><button class="btn btn-sm btn-outline-danger" onclick="this.closest('.detalle-row').remove();calcTotal()"><i class="bi bi-x"></i></button></div>`;
      document.getElementById('detalleRows').appendChild(div);
    }

    function calcTotal() {
      let total = 0;
      document.querySelectorAll('.detalle-row').forEach(row => {
        const cant = parseFloat(row.querySelector('.cant-input').value)||0;
        const costo = parseFloat(row.querySelector('.costo-input').value)||0;
        total += cant*costo;
      });
      document.getElementById('totalCompra').textContent = formatMoney(total);
    }

    function openModal() {
      document.getElementById('proveedor_id').value = '';
      document.getElementById('observaciones').value = '';
      document.getElementById('detalleRows').innerHTML = '';
      document.getElementById('totalCompra').textContent = '$0';
      document.getElementById('modalAlert').innerHTML = '';
      addRow();
      modal = new bootstrap.Modal(document.getElementById('formModal')); modal.show();
    }

    async function save() {
      const detalles = [];
      document.querySelectorAll('.detalle-row').forEach(row => {
        const pid = parseInt(row.querySelector('.prod-sel').value);
        const cant = parseFloat(row.querySelector('.cant-input').value);
        const costo = parseFloat(row.querySelector('.costo-input').value);
        if (pid && cant > 0 && costo > 0) detalles.push({ producto_id: pid, cantidad: cant, costo_unitario: costo });
      });
      try {
        await apiPost('/compras/', {
          proveedor_id: parseInt(document.getElementById('proveedor_id').value),
          observaciones: document.getElementById('observaciones').value || null,
          detalles,
        });
        modal.hide(); load();
      } catch(err) { showAlert(document.getElementById('modalAlert'), err.message); }
    }

    async function anular(id) {
      if (!confirm('Anular esta compra? Se revertira el inventario.')) return;
      try { await apiPost(`/compras/${id}/anular`); load(); }
      catch(err) { showAlert(document.getElementById('alertBox'), err.message); }
    }

    init();
  </script>
</body>
</html>
