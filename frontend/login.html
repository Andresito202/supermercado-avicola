<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Supermercado Avicola</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="static/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="login-container">
    <div class="card login-card">
      <div class="card-header">
        <h4 class="mb-0">Supermercado Avicola</h4>
        <small>Sistema de Gestion</small>
      </div>
      <div class="card-body p-4">
        <div id="alertBox"></div>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" id="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Contrasena</label>
            <input type="password" id="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-success w-100" id="btnLogin">Iniciar Sesion</button>
        </form>
      </div>
    </div>
  </div>
  <script src="static/js/api.js"></script>
  <script>
    if (getToken()) window.location.href = '/index.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      try {
        const data = await apiPost('/auth/login', {
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        });
        setToken(data.access_token);
        setUser(data.usuario);
        window.location.href = '/index.html';
      } catch (err) {
        showAlert(document.getElementById('alertBox'), err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Iniciar Sesion';
      }
    });
  </script>
</body>
</html>
