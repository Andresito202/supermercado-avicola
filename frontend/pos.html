<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS - Supermercado Avicola</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="static/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div id="topbar" class="top-bar"></div>
    <div id="alertBox"></div>

    <div class="row g-3">
      <div class="col-lg-7">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <strong>Nueva Venta</strong>
            <span id="cajaStatus" class="badge bg-secondary">Sin caja</span>
          </div>
          <div class="card-body">
            <div class="row g-2 mb-3">
              <div class="col-md-8">
                <input type="text" id="buscarProd" class="form-control" placeholder="Buscar producto por nombre o codigo..." oninput="buscarProducto()">
                <div id="searchResults" class="list-group position-absolute" style="z-index:10;max-height:200px;overflow-y:auto;"></div>
              </div>
              <div class="col-md-4">
                <select id="metodo_pago" class="form-select">
                  <option value="efectivo">Efectivo</option>
                  <option value="tarjeta">Tarjeta</option>
                  <option value="transferencia">Transferencia</option>
                  <option value="mixto">Mixto</option>
                </select>
              </div>
            </div>
            <table class="table table-sm">
              <thead><tr><th>Producto</th><th>Precio</th><th>Cant.</th><th>Subtotal</th><th></th></tr></thead>
              <tbody id="ventaItems"></tbody>
              <tfoot>
                <tr class="table-success"><td colspan="3" class="text-end fw-bold">TOTAL:</td><td colspan="2" class="fw-bold fs-5" id="ventaTotal">$0</td></tr>
              </tfoot>
            </table>
            <button class="btn btn-success btn-lg w-100" onclick="registrarVenta()"><i class="bi bi-cart-check"></i> Registrar Venta</button>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="card mb-3">
          <div class="card-header"><strong>Ventas Recientes</strong></div>
          <div class="card-body p-0" style="max-height:400px;overflow-y:auto;">
            <table class="table table-sm mb-0">
              <thead><tr><th>Numero</th><th>Total</th><th>Estado</th><th></th></tr></thead>
              <tbody id="ventasRecientes"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/layout.js"></script>
  <script>
    initPage('POS / Ventas', '/pos.html');
    let items = [], productosCache = [];

    async function init() {
      productosCache = await apiGet('/productos/?activo=true');
      const caja = await apiGet('/caja/actual').catch(() => null);
      document.getElementById('cajaStatus').textContent = caja ? 'Caja abierta' : 'Sin caja abierta';
      document.getElementById('cajaStatus').className = `badge ${caja ? 'bg-success' : 'bg-warning text-dark'}`;
      loadVentasRecientes();
    }

    function buscarProducto() {
      const q = document.getElementById('buscarProd').value.toLowerCase();
      const div = document.getElementById('searchResults');
      if (q.length < 2) { div.innerHTML = ''; return; }
      const found = productosCache.filter(p => p.nombre.toLowerCase().includes(q) || p.codigo.toLowerCase().includes(q)).slice(0, 8);
      div.innerHTML = found.map(p => `<button class="list-group-item list-group-item-action py-1 small" onclick="addItem(${p.id})">
        <strong>${p.codigo}</strong> - ${p.nombre} | ${formatMoney(p.precio_venta)}
      </button>`).join('');
    }

    function addItem(prodId) {
      const existing = items.find(i => i.producto_id === prodId);
      if (existing) { existing.cantidad++; }
      else {
        const prod = productosCache.find(p => p.id === prodId);
        items.push({ producto_id: prodId, nombre: prod.nombre, precio: prod.precio_venta, cantidad: 1 });
      }
      document.getElementById('buscarProd').value = '';
      document.getElementById('searchResults').innerHTML = '';
      renderItems();
    }

    function renderItems() {
      let total = 0;
      document.getElementById('ventaItems').innerHTML = items.map((it, i) => {
        const sub = it.precio * it.cantidad;
        total += sub;
        return `<tr>
          <td>${it.nombre}</td><td>${formatMoney(it.precio)}</td>
          <td style="width:80px"><input type="number" class="form-control form-control-sm" value="${it.cantidad}" min="0.001" step="0.001" onchange="updateCant(${i}, this.value)"></td>
          <td>${formatMoney(sub)}</td>
          <td><button class="btn btn-sm btn-outline-danger" onclick="removeItem(${i})"><i class="bi bi-x"></i></button></td>
        </tr>`;
      }).join('');
      document.getElementById('ventaTotal').textContent = formatMoney(total);
    }

    function updateCant(idx, val) { items[idx].cantidad = parseFloat(val) || 0; renderItems(); }
    function removeItem(idx) { items.splice(idx, 1); renderItems(); }

    async function registrarVenta() {
      if (items.length === 0) { showAlert(document.getElementById('alertBox'), 'Agrega productos a la venta'); return; }
      try {
        await apiPost('/ventas/', {
          metodo_pago: document.getElementById('metodo_pago').value,
          detalles: items.map(i => ({ producto_id: i.producto_id, cantidad: i.cantidad })),
        });
        items = [];
        renderItems();
        showAlert(document.getElementById('alertBox'), 'Venta registrada correctamente', 'success');
        loadVentasRecientes();
        productosCache = await apiGet('/productos/?activo=true');
      } catch (err) { showAlert(document.getElementById('alertBox'), err.message); }
    }

    async function loadVentasRecientes() {
      const data = await apiGet('/ventas/?limit=15');
      document.getElementById('ventasRecientes').innerHTML = data.map(v => `<tr>
        <td><small>${v.numero}</small></td><td>${formatMoney(v.total)}</td>
        <td><span class="badge ${v.estado==='completada'?'bg-success':'bg-danger'}">${v.estado}</span></td>
        <td>${v.estado==='completada'?`<button class="btn btn-sm btn-outline-danger py-0" onclick="anularVenta(${v.id})">Anular</button>`:''}</td>
      </tr>`).join('');
    }

    async function anularVenta(id) {
      if (!confirm('Anular esta venta? Se devolvera el stock.')) return;
      try { await apiPost(`/ventas/${id}/anular`); loadVentasRecientes(); showAlert(document.getElementById('alertBox'), 'Venta anulada', 'warning'); }
      catch(err) { showAlert(document.getElementById('alertBox'), err.message); }
    }

    init();
  </script>
</body>
</html>
