<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias - Supermercado Avicola</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="static/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div id="topbar" class="top-bar"></div>
    <div id="alertBox"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Categorias</h5>
      <button class="btn btn-success btn-sm" onclick="openModal()"><i class="bi bi-plus-lg"></i> Nueva</button>
    </div>

    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead><tr><th>ID</th><th>Nombre</th><th>Descripcion</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody id="tableBody"><tr><td colspan="5" class="text-center">Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="modalTitle">Categoria</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div id="modalAlert"></div>
          <input type="hidden" id="editId">
          <div class="mb-3"><label class="form-label">Nombre</label><input type="text" id="nombre" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Descripcion</label><textarea id="descripcion" class="form-control" rows="2"></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-success" onclick="save()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/layout.js"></script>
  <script>
    initPage('Categorias', '/categorias.html');
    let modal;

    async function load() {
      const data = await apiGet('/categorias/');
      document.getElementById('tableBody').innerHTML = data.length === 0
        ? '<tr><td colspan="5" class="text-center text-muted">Sin categorias</td></tr>'
        : data.map(c => `<tr>
            <td>${c.id}</td><td>${c.nombre}</td><td>${c.descripcion || '-'}</td>
            <td><span class="badge ${c.activa ? 'bg-success' : 'bg-secondary'}">${c.activa ? 'Activa' : 'Inactiva'}</span></td>
            <td>
              <button class="btn btn-sm btn-outline-primary" onclick='edit(${JSON.stringify(c)})'><i class="bi bi-pencil"></i></button>
              ${c.activa ? `<button class="btn btn-sm btn-outline-danger" onclick="del(${c.id})"><i class="bi bi-trash"></i></button>` : ''}
            </td>
          </tr>`).join('');
    }

    function openModal(cat = null) {
      document.getElementById('editId').value = cat ? cat.id : '';
      document.getElementById('nombre').value = cat ? cat.nombre : '';
      document.getElementById('descripcion').value = cat ? cat.descripcion || '' : '';
      document.getElementById('modalTitle').textContent = cat ? 'Editar Categoria' : 'Nueva Categoria';
      document.getElementById('modalAlert').innerHTML = '';
      modal = new bootstrap.Modal(document.getElementById('formModal'));
      modal.show();
    }

    function edit(cat) { openModal(cat); }

    async function save() {
      const id = document.getElementById('editId').value;
      const body = {
        nombre: document.getElementById('nombre').value,
        descripcion: document.getElementById('descripcion').value || null,
      };
      try {
        if (id) await apiPut(`/categorias/${id}`, body);
        else await apiPost('/categorias/', body);
        modal.hide();
        load();
      } catch (err) {
        showAlert(document.getElementById('modalAlert'), err.message);
      }
    }

    async function del(id) {
      if (!confirm('Desactivar esta categoria?')) return;
      await apiDelete(`/categorias/${id}`);
      load();
    }

    load();
  </script>
</body>
</html>
