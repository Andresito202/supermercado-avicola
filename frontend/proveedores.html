<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proveedores - Supermercado Avicola</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="static/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div id="topbar" class="top-bar"></div>
    <div id="alertBox"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Proveedores</h5>
      <button class="btn btn-success btn-sm" onclick="openModal()"><i class="bi bi-plus-lg"></i> Nuevo</button>
    </div>
    <div class="card">
      <div class="card-body p-0 table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr><th>NIT</th><th>Nombre</th><th>Contacto</th><th>Telefono</th><th>Email</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody id="tableBody"><tr><td colspan="7" class="text-center">Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="modalTitle">Proveedor</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div id="modalAlert"></div>
          <input type="hidden" id="editId">
          <div class="mb-3"><label class="form-label">NIT</label><input type="text" id="nit" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Nombre</label><input type="text" id="nombre" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Contacto</label><input type="text" id="contacto" class="form-control"></div>
          <div class="mb-3"><label class="form-label">Telefono</label><input type="text" id="telefono" class="form-control"></div>
          <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control"></div>
          <div class="mb-3"><label class="form-label">Direccion</label><textarea id="direccion" class="form-control" rows="2"></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-success" onclick="save()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/layout.js"></script>
  <script>
    initPage('Proveedores', '/proveedores.html');
    let modal;
    async function load() {
      const data = await apiGet('/proveedores/');
      document.getElementById('tableBody').innerHTML = data.length === 0
        ? '<tr><td colspan="7" class="text-center text-muted">Sin proveedores</td></tr>'
        : data.map(p => `<tr>
            <td><code>${p.nit}</code></td><td>${p.nombre}</td><td>${p.contacto||'-'}</td><td>${p.telefono||'-'}</td><td>${p.email||'-'}</td>
            <td><span class="badge ${p.activo?'bg-success':'bg-secondary'}">${p.activo?'Activo':'Inactivo'}</span></td>
            <td><button class="btn btn-sm btn-outline-primary" onclick='edit(${JSON.stringify(p)})'><i class="bi bi-pencil"></i></button>
            ${p.activo?`<button class="btn btn-sm btn-outline-danger" onclick="del(${p.id})"><i class="bi bi-trash"></i></button>`:''}</td>
          </tr>`).join('');
    }
    function openModal(p=null) {
      document.getElementById('editId').value = p?p.id:'';
      document.getElementById('nit').value = p?p.nit:''; document.getElementById('nit').disabled = !!p;
      document.getElementById('nombre').value = p?p.nombre:'';
      document.getElementById('contacto').value = p?p.contacto||'':'';
      document.getElementById('telefono').value = p?p.telefono||'':'';
      document.getElementById('email').value = p?p.email||'':'';
      document.getElementById('direccion').value = p?p.direccion||'':'';
      document.getElementById('modalTitle').textContent = p?'Editar Proveedor':'Nuevo Proveedor';
      document.getElementById('modalAlert').innerHTML = '';
      modal = new bootstrap.Modal(document.getElementById('formModal')); modal.show();
    }
    function edit(p) { openModal(p); }
    async function save() {
      const id = document.getElementById('editId').value;
      const body = { nombre: document.getElementById('nombre').value, contacto: document.getElementById('contacto').value||null,
        telefono: document.getElementById('telefono').value||null, email: document.getElementById('email').value||null,
        direccion: document.getElementById('direccion').value||null };
      if (!id) body.nit = document.getElementById('nit').value;
      try { if(id) await apiPut(`/proveedores/${id}`,body); else await apiPost('/proveedores/',body); modal.hide(); load(); }
      catch(err) { showAlert(document.getElementById('modalAlert'), err.message); }
    }
    async function del(id) { if(!confirm('Desactivar proveedor?')) return; await apiDelete(`/proveedores/${id}`); load(); }
    load();
  </script>
</body>
</html>
