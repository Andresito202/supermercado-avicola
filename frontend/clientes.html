<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Supermercado Avicola</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="static/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div id="topbar" class="top-bar"></div>
    <div id="alertBox"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Clientes</h5>
      <button class="btn btn-success btn-sm" onclick="openModal()"><i class="bi bi-plus-lg"></i> Nuevo</button>
    </div>
    <div class="card">
      <div class="card-body p-0 table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr><th>Documento</th><th>Nombre</th><th>Telefono</th><th>Email</th><th>Acciones</th></tr></thead>
          <tbody id="tableBody"><tr><td colspan="5" class="text-center">Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="modalTitle">Cliente</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div id="modalAlert"></div>
          <input type="hidden" id="editId">
          <div class="mb-3"><label class="form-label">Documento</label><input type="text" id="documento" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Nombre</label><input type="text" id="nombre" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Telefono</label><input type="text" id="telefono" class="form-control"></div>
          <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-success" onclick="save()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/layout.js"></script>
  <script>
    initPage('Clientes', '/clientes.html');
    let modal;
    async function load() {
      const data = await apiGet('/clientes/');
      document.getElementById('tableBody').innerHTML = data.length === 0
        ? '<tr><td colspan="5" class="text-center text-muted">Sin clientes</td></tr>'
        : data.map(c => `<tr>
            <td><code>${c.documento}</code></td><td>${c.nombre}</td><td>${c.telefono||'-'}</td><td>${c.email||'-'}</td>
            <td><button class="btn btn-sm btn-outline-primary" onclick='edit(${JSON.stringify(c)})'><i class="bi bi-pencil"></i></button></td>
          </tr>`).join('');
    }
    function openModal(c=null) {
      document.getElementById('editId').value = c?c.id:'';
      document.getElementById('documento').value = c?c.documento:''; document.getElementById('documento').disabled = !!c;
      document.getElementById('nombre').value = c?c.nombre:'';
      document.getElementById('telefono').value = c?c.telefono||'':'';
      document.getElementById('email').value = c?c.email||'':'';
      document.getElementById('modalTitle').textContent = c?'Editar Cliente':'Nuevo Cliente';
      document.getElementById('modalAlert').innerHTML = '';
      modal = new bootstrap.Modal(document.getElementById('formModal')); modal.show();
    }
    function edit(c) { openModal(c); }
    async function save() {
      const id = document.getElementById('editId').value;
      const body = { nombre: document.getElementById('nombre').value, telefono: document.getElementById('telefono').value||null, email: document.getElementById('email').value||null };
      if (!id) body.documento = document.getElementById('documento').value;
      try { if(id) await apiPut(`/clientes/${id}`,body); else await apiPost('/clientes/',body); modal.hide(); load(); }
      catch(err) { showAlert(document.getElementById('modalAlert'), err.message); }
    }
    load();
  </script>
</body>
</html>
