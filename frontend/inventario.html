<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario - Supermercado Avicola</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="static/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div id="topbar" class="top-bar"></div>
    <div id="alertBox"></div>

    <ul class="nav nav-tabs mb-3">
      <li class="nav-item"><a class="nav-link active" href="#" onclick="showTab('stock')">Stock</a></li>
      <li class="nav-item"><a class="nav-link" href="#" onclick="showTab('lotes')">Lotes</a></li>
      <li class="nav-item"><a class="nav-link" href="#" onclick="showTab('movimientos')">Movimientos</a></li>
      <li class="nav-item"><a class="nav-link" href="#" onclick="showTab('alertas')">Alertas Vencimiento</a></li>
    </ul>

    <div id="tabContent"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/layout.js"></script>
  <script>
    initPage('Inventario', '/inventario.html');

    function showTab(tab) {
      document.querySelectorAll('.nav-tabs .nav-link').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
      if (tab === 'stock') loadStock();
      else if (tab === 'lotes') loadLotes();
      else if (tab === 'movimientos') loadMovimientos();
      else if (tab === 'alertas') loadAlertas();
    }

    async function loadStock() {
      const data = await apiGet('/inventario/stock');
      document.getElementById('tabContent').innerHTML = `
        <div class="card"><div class="card-body p-0 table-responsive">
          <table class="table table-hover mb-0">
            <thead><tr><th>Codigo</th><th>Producto</th><th>Stock</th><th>Minimo</th><th>Estado</th></tr></thead>
            <tbody>${data.map(s => `<tr class="${s.alerta_stock_bajo ? 'table-warning' : ''}">
              <td><code>${s.producto_codigo}</code></td><td>${s.producto_nombre}</td>
              <td>${s.stock_total}</td><td>${s.stock_minimo}</td>
              <td>${s.alerta_stock_bajo ? '<span class="badge bg-danger">Bajo</span>' : '<span class="badge bg-success">OK</span>'}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div></div>`;
    }

    async function loadLotes() {
      const data = await apiGet('/inventario/lotes');
      document.getElementById('tabContent').innerHTML = `
        <div class="card"><div class="card-body p-0 table-responsive">
          <table class="table table-hover mb-0">
            <thead><tr><th>Lote</th><th>Producto ID</th><th>Disponible</th><th>Ingreso</th><th>Vencimiento</th><th>Estado</th></tr></thead>
            <tbody>${data.map(l => `<tr>
              <td><code>${l.codigo_lote}</code></td><td>${l.producto_id}</td><td>${l.cantidad_disponible}</td>
              <td>${l.fecha_ingreso}</td><td>${l.fecha_vencimiento || '-'}</td>
              <td>${l.agotado ? '<span class="badge bg-secondary">Agotado</span>' : '<span class="badge bg-success">Disponible</span>'}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div></div>`;
    }

    async function loadMovimientos() {
      const data = await apiGet('/inventario/movimientos?limit=50');
      document.getElementById('tabContent').innerHTML = `
        <div class="card"><div class="card-body p-0 table-responsive">
          <table class="table table-hover mb-0">
            <thead><tr><th>Fecha</th><th>Producto ID</th><th>Tipo</th><th>Cantidad</th><th>Referencia</th><th>Notas</th></tr></thead>
            <tbody>${data.map(m => `<tr>
              <td>${formatDateTime(m.created_at)}</td><td>${m.producto_id}</td>
              <td><span class="badge bg-${m.tipo.includes('entrada')||m.tipo.includes('positivo')||m.tipo==='devolucion'?'success':'danger'}">${m.tipo}</span></td>
              <td>${m.cantidad}</td><td>${m.referencia_tipo||'-'} ${m.referencia_id||''}</td><td>${m.observaciones||'-'}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div></div>`;
    }

    async function loadAlertas() {
      const data = await apiGet('/inventario/alertas-vencimiento?dias=30');
      document.getElementById('tabContent').innerHTML = data.length === 0
        ? '<div class="alert alert-success">Sin alertas de vencimiento proximas</div>'
        : `<div class="card"><div class="card-body p-0 table-responsive">
          <table class="table table-hover mb-0">
            <thead><tr><th>Producto</th><th>Lote</th><th>Disponible</th><th>Vencimiento</th><th>Dias</th></tr></thead>
            <tbody>${data.map(a => `<tr class="${a.dias_restantes<=0?'table-danger':'table-warning'}">
              <td>${a.producto_nombre}</td><td>${a.codigo_lote}</td><td>${a.cantidad_disponible}</td>
              <td>${a.fecha_vencimiento}</td>
              <td><span class="badge ${a.dias_restantes<=0?'bg-danger':'bg-warning text-dark'}">${a.dias_restantes}d</span></td>
            </tr>`).join('')}</tbody>
          </table>
        </div></div>`;
    }

    loadStock();
  </script>
</body>
</html>
