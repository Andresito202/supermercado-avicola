<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja - Supermercado Avicola</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="static/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div id="topbar" class="top-bar"></div>
    <div id="alertBox"></div>
    <h5 class="mb-3">Caja</h5>
    <div id="cajaContent">Cargando...</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/layout.js"></script>
  <script>
    initPage('Caja', '/caja.html');

    async function loadCaja() {
      const caja = await apiGet('/caja/actual').catch(() => null);
      const container = document.getElementById('cajaContent');

      if (!caja) {
        container.innerHTML = `
          <div class="card" style="max-width:400px">
            <div class="card-body">
              <h6>Abrir Caja</h6>
              <div class="mb-3"><label class="form-label">Monto de apertura</label><input type="number" id="montoApertura" class="form-control" min="0" step="0.01" value="0"></div>
              <button class="btn btn-success w-100" onclick="abrirCaja()">Abrir Caja</button>
            </div>
          </div>`;
        return;
      }

      const totalIngresos = caja.movimientos.filter(m => m.tipo === 'venta' || m.tipo === 'ingreso').reduce((s,m) => s + parseFloat(m.monto), 0);
      const totalEgresos = caja.movimientos.filter(m => m.tipo === 'egreso').reduce((s,m) => s + parseFloat(m.monto), 0);

      container.innerHTML = `
        <div class="row g-3 mb-3">
          <div class="col-md-3"><div class="card stat-card"><div class="card-body text-center">
            <div class="text-muted small">Apertura</div><h5 class="text-primary">${formatMoney(caja.monto_apertura)}</h5>
          </div></div></div>
          <div class="col-md-3"><div class="card stat-card"><div class="card-body text-center">
            <div class="text-muted small">Ingresos</div><h5 class="text-success">${formatMoney(totalIngresos)}</h5>
          </div></div></div>
          <div class="col-md-3"><div class="card stat-card"><div class="card-body text-center">
            <div class="text-muted small">Egresos</div><h5 class="text-danger">${formatMoney(totalEgresos)}</h5>
          </div></div></div>
          <div class="col-md-3"><div class="card stat-card"><div class="card-body text-center">
            <div class="text-muted small">Esperado</div><h5>${formatMoney(parseFloat(caja.monto_apertura) + totalIngresos - totalEgresos)}</h5>
          </div></div></div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <div class="card"><div class="card-body">
              <h6>Registrar Movimiento</h6>
              <div class="mb-2"><select id="tipoMov" class="form-select form-select-sm"><option value="ingreso">Ingreso</option><option value="egreso">Egreso</option></select></div>
              <div class="mb-2"><input type="number" id="montoMov" class="form-control form-control-sm" placeholder="Monto" min="0.01" step="0.01"></div>
              <div class="mb-2"><input type="text" id="descMov" class="form-control form-control-sm" placeholder="Descripcion"></div>
              <button class="btn btn-primary btn-sm w-100" onclick="registrarMov()">Registrar</button>
            </div></div>
          </div>
          <div class="col-md-6">
            <div class="card"><div class="card-body">
              <h6>Cerrar Caja</h6>
              <div class="mb-2"><input type="number" id="montoCierre" class="form-control form-control-sm" placeholder="Monto real en caja" min="0" step="0.01"></div>
              <div class="mb-2"><input type="text" id="obsCierre" class="form-control form-control-sm" placeholder="Observaciones"></div>
              <button class="btn btn-danger btn-sm w-100" onclick="cerrarCaja()">Cerrar Caja</button>
            </div></div>
          </div>
        </div>

        <div class="card"><div class="card-body p-0 table-responsive">
          <table class="table table-sm mb-0">
            <thead><tr><th>Fecha</th><th>Tipo</th><th>Monto</th><th>Descripcion</th></tr></thead>
            <tbody>${caja.movimientos.map(m => `<tr>
              <td>${formatDateTime(m.created_at)}</td>
              <td><span class="badge bg-${m.tipo==='venta'||m.tipo==='ingreso'?'success':m.tipo==='apertura'?'primary':'danger'}">${m.tipo}</span></td>
              <td>${formatMoney(m.monto)}</td><td>${m.descripcion||'-'}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div></div>`;
    }

    async function abrirCaja() {
      try {
        await apiPost('/caja/abrir', { monto_apertura: parseFloat(document.getElementById('montoApertura').value) || 0 });
        loadCaja();
      } catch(err) { showAlert(document.getElementById('alertBox'), err.message); }
    }

    async function registrarMov() {
      try {
        await apiPost('/caja/movimiento', {
          tipo: document.getElementById('tipoMov').value,
          monto: parseFloat(document.getElementById('montoMov').value),
          descripcion: document.getElementById('descMov').value || null,
        });
        loadCaja();
      } catch(err) { showAlert(document.getElementById('alertBox'), err.message); }
    }

    async function cerrarCaja() {
      if (!confirm('Cerrar la caja?')) return;
      try {
        await apiPost('/caja/cerrar', {
          monto_cierre: parseFloat(document.getElementById('montoCierre').value),
          observaciones: document.getElementById('obsCierre').value || null,
        });
        showAlert(document.getElementById('alertBox'), 'Caja cerrada correctamente', 'success');
        loadCaja();
      } catch(err) { showAlert(document.getElementById('alertBox'), err.message); }
    }

    loadCaja();
  </script>
</body>
</html>
