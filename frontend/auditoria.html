<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditoria - Supermercado Avicola</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="static/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div id="topbar" class="top-bar"></div>
    <div id="alertBox"></div>
    <h5 class="mb-3">Auditoria - Historial de Acciones</h5>

    <div class="row g-2 mb-3">
      <div class="col-md-3"><input type="text" id="filtroEntidad" class="form-control form-control-sm" placeholder="Filtrar por entidad..." oninput="load()"></div>
      <div class="col-md-3"><input type="text" id="filtroAccion" class="form-control form-control-sm" placeholder="Filtrar por accion..." oninput="load()"></div>
    </div>

    <div class="card">
      <div class="card-body p-0 table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr><th>Fecha</th><th>Usuario ID</th><th>Accion</th><th>Entidad</th><th>ID Entidad</th><th>Detalle</th><th>IP</th></tr></thead>
          <tbody id="tableBody"><tr><td colspan="7" class="text-center">Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/layout.js"></script>
  <script>
    initPage('Auditoria', '/auditoria.html');

    async function load() {
      let url = '/auditoria/?limit=100';
      const entidad = document.getElementById('filtroEntidad').value;
      const accion = document.getElementById('filtroAccion').value;
      if (entidad) url += `&entidad=${encodeURIComponent(entidad)}`;
      if (accion) url += `&accion=${encodeURIComponent(accion)}`;

      try {
        const data = await apiGet(url);
        document.getElementById('tableBody').innerHTML = data.length === 0
          ? '<tr><td colspan="7" class="text-center text-muted">Sin registros de auditoria</td></tr>'
          : data.map(a => `<tr>
              <td>${formatDateTime(a.created_at)}</td>
              <td>${a.usuario_id}</td>
              <td><span class="badge bg-info">${a.accion}</span></td>
              <td>${a.entidad}</td>
              <td>${a.entidad_id || '-'}</td>
              <td><small>${a.detalle || '-'}</small></td>
              <td><small>${a.ip || '-'}</small></td>
            </tr>`).join('');
      } catch (err) {
        showAlert(document.getElementById('alertBox'), err.message);
      }
    }

    load();
  </script>
</body>
</html>
