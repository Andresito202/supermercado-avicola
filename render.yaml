services:
  - type: web
    name: supermercado-avicola
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: supermercado-avicola-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: CORS_ORIGINS
        value: https://supermercado-avicola.onrender.com
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: SEED_DEMO_DATA
        value: "true"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        value: admin@avicola.demo

databases:
  - name: supermercado-avicola-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"
    databaseName: supermercado_avicola
    user: avicola_user
    ipAllowList: []
